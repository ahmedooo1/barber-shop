# Configuration nginx pour barbershop.aaweb.fr
#
# À copier sur le VPS dans /etc/nginx/sites-available/, puis activer avec :
#   sudo ln -s /etc/nginx/sites-available/barbershop.aaweb.fr.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ce fichier ne touche à AUCUNE configuration de vos autres sites : chaque
# site nginx a son propre fichier dans sites-available/, indépendant des
# autres (routage basé sur server_name, pas sur le port d'écoute externe).
#
# Le port 3005 doit correspondre à celui utilisé dans ecosystem.config.js
# (PM2). Changez les deux ensemble si 3005 est déjà pris par un autre site.

server {
    listen 80;
    listen [::]:80;
    server_name barbershop.aaweb.fr;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Après avoir lancé certbot (voir DEPLOY_VPS.md), ce fichier sera
# automatiquement complété par certbot avec un bloc "listen 443 ssl" et
# les chemins vers les certificats - inutile de l'ajouter à la main.
